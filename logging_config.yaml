version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  simple:
    format: '%(levelname)s - %(message)s'

  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  json:
    (): personal_finance_toolkit.logging_config.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: default
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: personal_finance_toolkit.log
    maxBytes: 10485760 # 10 MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: personal_finance_toolkit_errors.log
    maxBytes: 10485760 # 10 MB
    backupCount: 5
    encoding: utf-8

loggers:
  personal_finance_toolkit:
    level: DEBUG
    handlers: [ console, file, error_file ]
    propagate: false

  personal_finance_toolkit.cli:
    level: DEBUG
    handlers: [ console, file, error_file ]
    propagate: false

  personal_finance_toolkit.categorizers:
    level: DEBUG
    handlers: [ console, file, error_file ]
    propagate: false

  personal_finance_toolkit.config:
    level: DEBUG
    handlers: [ console, file, error_file ]
    propagate: false

root:
  level: INFO
  handlers: [ console, file, error_file ]
